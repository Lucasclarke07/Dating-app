<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Wick — Light the flame</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Wick"/>
  <meta name="theme-color" content="#0c0c0e"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0c0c0e;--surface:#161618;--surface2:#1e1e21;
      --accent:#ff5c6a;--accent2:#ff8c69;
      --text:#f5f5f7;--text-dim:#8e8e93;
      --border:rgba(255,255,255,0.08);
      --green:#4ade80;--blue:#60a5fa;
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);}
    body{display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;color:var(--text);}
    #root{width:100%;max-width:430px;height:100vh;position:relative;overflow:hidden;}
    
    /* Scrollable areas */
    .scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .scroll::-webkit-scrollbar{display:none;}

    /* Screen */
    .screen{position:absolute;inset:0;display:flex;flex-direction:column;animation:fadeUp .25s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

    /* Typography */
    .serif{font-family:'Fraunces',serif;}
    .serif-italic{font-family:'Fraunces',serif;font-style:italic;}

    /* Buttons */
    .btn{width:100%;padding:16px;border-radius:50px;border:none;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn:active{transform:scale(.97);}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
    .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
    .btn-ghost{background:transparent;color:var(--text-dim);font-size:14px;}
    .btn-sm{padding:10px 20px;width:auto;font-size:14px;}

    /* Inputs */
    .input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:15px 18px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color .2s;}
    .input:focus{border-color:var(--accent);}
    .input::placeholder{color:var(--text-dim);}
    .input-label{font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:block;}
    .input-group{margin-bottom:18px;}
    select.input{appearance:none;cursor:pointer;}

    /* ===================== WELCOME ===================== */
    .welcome{background:linear-gradient(160deg,#1a0a0c,#0c0c0e 50%,#0a0c1a);padding:60px 32px 48px;justify-content:space-between;}
    .logo{font-family:'Fraunces',serif;font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px;}
    .tagline{font-family:'Fraunces',serif;font-size:52px;font-weight:700;line-height:1.05;letter-spacing:-2px;margin-bottom:16px;}
    .tagline em{font-style:italic;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .welcome-sub{color:var(--text-dim);font-size:16px;line-height:1.5;}

    /* ===================== AUTH ===================== */
    .auth-screen{padding:60px 28px 40px;background:var(--bg);}
    .auth-title{font-family:'Fraunces',serif;font-size:34px;font-weight:700;letter-spacing:-1px;margin-bottom:8px;}
    .auth-sub{color:var(--text-dim);font-size:15px;margin-bottom:36px;}
    .auth-switch{text-align:center;margin-top:20px;color:var(--text-dim);font-size:14px;}
    .auth-switch button{background:none;border:none;color:var(--accent);font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;}
    .error-msg{background:rgba(255,92,106,.12);border:1px solid rgba(255,92,106,.3);border-radius:12px;padding:12px 16px;color:var(--accent);font-size:14px;margin-bottom:16px;}

    /* ===================== SETUP ===================== */
    .setup-screen{padding:52px 24px 100px;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .setup-step{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;}
    .setup-title{font-family:'Fraunces',serif;font-size:30px;font-weight:700;letter-spacing:-1px;margin-bottom:28px;}
    .progress-bar{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:32px;}
    .progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s ease;}
    .gender-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
    .gender-option{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;font-size:14px;font-weight:500;}
    .gender-option.selected{border-color:var(--accent);background:rgba(255,92,106,.08);}
    .gender-option .icon{font-size:28px;margin-bottom:8px;}

    /* Photo upload */
    .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
    .photo-slot{aspect-ratio:3/4;border-radius:16px;background:var(--surface);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:border-color .2s;}
    .photo-slot:hover{border-color:var(--accent);}
    .photo-slot img{width:100%;height:100%;object-fit:cover;}
    .photo-slot .add-icon{font-size:28px;color:var(--text-dim);}
    .photo-slot .remove-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);border:none;border-radius:50%;width:24px;height:24px;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
    .photo-slot.primary-slot{grid-column:span 3;aspect-ratio:16/9;}

    /* ===================== MAIN APP ===================== */
    .app-screen{background:var(--bg);}
    
    /* Header */
    .app-header{display:flex;align-items:center;justify-content:space-between;padding:52px 20px 16px;}
    .header-logo{font-family:'Fraunces',serif;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .icon-btn{width:42px;height:42px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s;}
    .icon-btn:active{transform:scale(.92);}

    /* Card stack */
    .card-area{flex:1;padding:0 16px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;position:relative;}
    .profile-card{position:absolute;width:100%;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);user-select:none;touch-action:none;}
    .profile-card.front{z-index:2;cursor:grab;}
    .profile-card.front:active{cursor:grabbing;}
    .profile-card.behind{z-index:1;transform:scale(.94) translateY(14px);pointer-events:none;}
    .card-photo{width:100%;height:460px;object-fit:cover;display:block;background:var(--surface2);}
    .card-emoji-bg{width:100%;height:460px;display:flex;align-items:center;justify-content:center;font-size:120px;}
    .card-gradient{position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(to top,rgba(0,0,0,.95),transparent);}
    .card-info{position:absolute;bottom:0;left:0;right:0;padding:24px 20px;}
    .card-name{font-family:'Fraunces',serif;font-size:28px;font-weight:700;letter-spacing:-.5px;}
    .card-detail{color:rgba(255,255,255,.7);font-size:14px;margin-top:4px;}
    .card-bio{color:rgba(255,255,255,.8);font-size:14px;margin-top:8px;line-height:1.4;}
    .card-distance{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);padding:4px 10px;border-radius:50px;font-size:12px;font-weight:600;margin-top:8px;}
    .swipe-indicator{position:absolute;top:32px;padding:8px 18px;border-radius:8px;font-weight:800;font-size:22px;border:3px solid;opacity:0;transition:opacity .1s;z-index:3;}
    .swipe-indicator.like{right:20px;color:#4ade80;border-color:#4ade80;transform:rotate(-15deg);}
    .swipe-indicator.nope{left:20px;color:var(--accent);border-color:var(--accent);transform:rotate(15deg);}

    /* Action buttons */
    .swipe-actions{display:flex;align-items:center;justify-content:center;gap:18px;padding:16px 24px 8px;}
    .action-btn{border:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:22px;}
    .action-btn:active{transform:scale(.88);}
    .action-pass{width:58px;height:58px;background:var(--surface2);border:1px solid var(--border);color:var(--accent);}
    .action-like{width:70px;height:70px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 8px 28px rgba(255,92,106,.4);}
    .action-super{width:58px;height:58px;background:var(--surface2);border:1px solid var(--border);color:var(--blue);}

    /* Bottom nav */
    .bottom-nav{position:absolute;bottom:0;left:0;right:0;height:70px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:6px;}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 20px;border-radius:12px;font-size:22px;}
    .nav-item span{font-size:10px;font-weight:600;color:var(--text-dim);}
    .nav-item.active span{color:var(--accent);}
    .nav-badge{position:relative;}
    .badge{position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface);}

    /* ===================== INBOX ===================== */
    .inbox-header{padding:52px 20px 16px;}
    .inbox-title{font-family:'Fraunces',serif;font-size:30px;font-weight:700;letter-spacing:-1px;}
    .inbox-sub{color:var(--text-dim);font-size:14px;margin-top:4px;}
    .match-row{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .15s;}
    .match-row:active{background:var(--surface);}
    .match-avatar{width:58px;height:58px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:26px;}
    .match-info{flex:1;min-width:0;}
    .match-name{font-weight:600;font-size:16px;}
    .match-preview{color:var(--text-dim);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
    .match-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
    .msg-pill{border-radius:50px;padding:3px 10px;font-size:11px;font-weight:700;border:1px solid;}
    .msg-pill.ok{color:var(--green);border-color:rgba(74,222,128,.3);}
    .msg-pill.warn{color:var(--accent);border-color:rgba(255,92,106,.3);}
    .expiry-text{font-size:10px;color:var(--text-dim);}

    /* ===================== CHAT ===================== */
    .chat-header{display:flex;align-items:center;gap:12px;padding:52px 16px 14px;border-bottom:1px solid var(--border);}
    .back-btn{font-size:22px;cursor:pointer;color:var(--text-dim);padding:4px;flex-shrink:0;}
    .chat-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .chat-name-block{}
    .chat-name{font-weight:600;font-size:16px;}
    .chat-status{font-size:12px;color:var(--text-dim);}
    .limit-bar-wrap{margin:10px 16px 0;background:var(--surface);border-radius:12px;padding:10px 14px;}
    .limit-bar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;}
    .limit-label{color:var(--text-dim);}
    .limit-count{font-weight:700;}
    .limit-count.safe{color:var(--green);}
    .limit-count.warn{color:var(--accent);}
    .limit-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
    .limit-fill{height:100%;border-radius:2px;transition:width .3s;}
    .messages-list{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
    .messages-list::-webkit-scrollbar{display:none;}
    .message{max-width:78%;padding:11px 15px;border-radius:18px;font-size:15px;line-height:1.4;animation:fadeUp .2s ease;}
    .message.sent{align-self:flex-end;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:4px;}
    .message.received{align-self:flex-start;background:var(--surface);color:var(--text);border-bottom-left-radius:4px;}
    .msg-time{font-size:10px;opacity:.6;margin-top:3px;}
    .chat-input-area{padding:10px 12px 28px;display:flex;gap:8px;align-items:flex-end;border-top:1px solid var(--border);}
    .chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;resize:none;max-height:100px;transition:border-color .2s;}
    .chat-input:focus{border-color:var(--accent);}
    .chat-input::placeholder{color:var(--text-dim);}
    .send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0;transition:all .2s;}
    .send-btn:active{transform:scale(.9);}
    .send-btn:disabled{opacity:.4;cursor:not-allowed;}
    .limit-reached-box{margin:10px 16px;background:rgba(255,92,106,.08);border:1px solid rgba(255,92,106,.25);border-radius:18px;padding:20px;text-align:center;}
    .limit-reached-icon{font-size:36px;margin-bottom:10px;}
    .limit-reached-title{font-family:'Fraunces',serif;font-size:20px;font-weight:700;margin-bottom:6px;}
    .limit-reached-sub{color:var(--text-dim);font-size:13px;line-height:1.5;margin-bottom:16px;}
    .limit-actions{display:flex;gap:8px;}

    /* ===================== MATCH SCREEN ===================== */
    .match-screen{background:radial-gradient(ellipse at 50% 35%,rgba(255,92,106,.22),var(--bg) 65%);align-items:center;justify-content:center;text-align:center;padding:40px 28px;}
    .match-title{font-family:'Fraunces',serif;font-style:italic;font-size:52px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-2px;margin-bottom:8px;animation:pop .5s ease;}
    @keyframes pop{from{transform:scale(.8);opacity:0;}60%{transform:scale(1.06);}to{transform:scale(1);opacity:1;}}
    .match-avatars{display:flex;justify-content:center;margin:28px 0;gap:-16px;}
    .match-av{width:100px;height:100px;border-radius:50%;border:4px solid var(--bg);object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:52px;animation:pop .5s ease;}
    .match-av:last-child{margin-left:-16px;animation-delay:.1s;}
    .match-badge{background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:10px 20px;font-size:13px;color:var(--text-dim);margin-bottom:28px;}
    .match-badge strong{color:var(--accent);}

    /* ===================== PROFILE ===================== */
    .profile-screen{background:var(--bg);}
    .profile-header{padding:52px 20px 20px;}
    .profile-photo-big{width:90px;height:90px;border-radius:50%;object-fit:cover;margin-bottom:14px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:48px;}
    .profile-name-big{font-family:'Fraunces',serif;font-size:26px;font-weight:700;letter-spacing:-.5px;}
    .profile-detail{color:var(--text-dim);font-size:14px;margin-top:4px;}
    .profile-section{padding:16px 20px;border-top:1px solid var(--border);}
    .profile-section-title{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}

    /* Loading */
    .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);flex-direction:column;gap:16px;}
    .loading-logo{font-family:'Fraunces',serif;font-size:40px;font-weight:900;font-style:italic;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pulse 1.5s ease infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
    .loading-text{color:var(--text-dim);font-size:14px;}

    /* Empty state */
    .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:14px;}
    .empty-icon{font-size:60px;}
    .empty-title{font-family:'Fraunces',serif;font-size:24px;font-weight:700;}
    .empty-sub{color:var(--text-dim);font-size:15px;line-height:1.5;}

    /* Toast */
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:12px 20px;font-size:14px;font-weight:500;z-index:9999;white-space:nowrap;animation:toastIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4);}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ===================== SUPABASE =====================
const SUPABASE_URL = 'https://mjxafkyjwlbaqjnzrsaf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sZaFdtRgykoFooY5Ci17gg_JR0hcnS5';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MAX_MESSAGES = 10;
const MATCH_DAYS = 7;
const BG_COLORS = ['#2d1b2e','#1b2d2e','#2e2b1b','#1b1e2d','#2d1b1b','#1b2d1b'];

// ===================== HELPERS =====================
function getAge(dob) {
  const diff = Date.now() - new Date(dob).getTime();
  return Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
}

function daysLeft(expiresAt) {
  const diff = new Date(expiresAt) - new Date();
  return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
}

function distanceKm(lat1, lon1, lat2, lon2) {
  if (!lat1 || !lat2) return null;
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  const km = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return km < 1 ? '<1 km' : `${Math.round(km)} km`;
}

// ===================== APP =====================
function App() {
  const [loading, setLoading] = useState(true);
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [screen, setScreen] = useState('welcome'); // welcome|signin|signup|setup-profile|setup-photos|app
  const [toast, setToast] = useState(null);

  const showToast = (msg, duration = 2500) => {
    setToast(msg);
    setTimeout(() => setToast(null), duration);
  };

  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      if (session) loadProfile(session.user.id);
      else { setLoading(false); setScreen('welcome'); }
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      if (session) loadProfile(session.user.id);
    });
    return () => subscription.unsubscribe();
  }, []);

  const loadProfile = async (userId) => {
    const { data } = await supabase.from('profiles').select('*').eq('id', userId).single();
    setLoading(false);
    if (data) { setProfile(data); setScreen('app'); }
    else setScreen('setup-profile');
  };

  const handleSignOut = async () => {
    await supabase.auth.signOut();
    setSession(null); setProfile(null); setScreen('welcome');
  };

  if (loading) return (
    <div className="loading">
      <div className="loading-logo">wick</div>
      <div className="loading-text">lighting up...</div>
    </div>
  );

  return (
    <>
      {screen === 'welcome' && <WelcomeScreen onSignIn={() => setScreen('signin')} onSignUp={() => setScreen('signup')} />}
      {screen === 'signin' && <SignInScreen onBack={() => setScreen('welcome')} onSwitch={() => setScreen('signup')} onSuccess={(s) => { setSession(s); loadProfile(s.user.id); }} showToast={showToast} />}
      {screen === 'signup' && <SignUpScreen onBack={() => setScreen('welcome')} onSwitch={() => setScreen('signin')} onSuccess={(s) => { setSession(s); setScreen('setup-profile'); }} showToast={showToast} />}
      {screen === 'setup-profile' && session && <SetupProfileScreen session={session} onComplete={(p) => { setProfile(p); setScreen('setup-photos'); }} showToast={showToast} />}
      {screen === 'setup-photos' && session && profile && <SetupPhotosScreen session={session} profile={profile} onComplete={() => setScreen('app')} showToast={showToast} />}
      {screen === 'app' && session && profile && <MainApp session={session} profile={profile} setProfile={setProfile} onSignOut={handleSignOut} showToast={showToast} />}
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

function SignInScreen({ onBack, onSwitch, onSuccess, showToast }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleSignIn = async () => {
    if (!email || !password) { setError('Please fill in all fields'); return; }
    setLoading(true); setError('');
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (error) setError(error.message);
    else onSuccess(data.session);
  };

  return (
    <div className="screen auth-screen">
      <button className="btn btn-ghost" style={{width:'auto',marginBottom:24}} onClick={onBack}>← Back</button>

      {error && <div className="error-msg">{error}</div>}
      <div className="input-group"><label className="input-label">Email</label><input className="input" type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)}/></div>
      <div className="input-group"><label className="input-label">Password</label><input className="input" type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSignIn()}/></div>
      <button className="btn btn-primary" onClick={handleSignIn} disabled={loading}>{loading ? 'Signing in...' : 'Sign In'}</button>
      <div className="auth-switch">Don't have an account? <button onClick={onSwitch}>Sign up</button></div>
    </div>
  );
}

// ===================== SIGN UP =====================
function SignUpScreen({ onBack, onSwitch, onSuccess, showToast }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleSignUp = async () => {
    if (!email || !password) { setError('Please fill in all fields'); return; }
    if (password.length < 6) { setError('Password must be at least 6 characters'); return; }
    setLoading(true); setError('');

    if (error) setError(error.message);
    else if (data.session) onSuccess(data.session);

  return (
    <div className="screen auth-screen">
      <button className="btn btn-ghost" style={{width:'auto',marginBottom:24}} onClick={onBack}>← Back</button>

// ===================== SETUP PROFILE =====================
function SetupProfileScreen({ session, onComplete, showToast }) {
  const [name, setName] = useState('');
  const [dob, setDob] = useState('');
  const [gender, setGender] = useState('');
  const [lookingFor, setLookingFor] = useState('');
  const [bio, setBio] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [step, setStep] = useState(1);

  const handleNext = async () => {
    if (step === 1) {
      if (!name || !dob || !gender || !lookingFor) { setError('Please fill in all fields'); return; }
      const age = getAge(dob);
      if (age < 18) { setError('You must be 18 or older to use Wick'); return; }
      if (age > 100) { setError('Please enter a valid date of birth'); return; }
      setError(''); setStep(2);
    } else {
      setLoading(true); setError('');
      // Get location
      let lat = null, lng = null;
      try {
        const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 }));
        lat = pos.coords.latitude; lng = pos.coords.longitude;
      } catch(e) {}

      const { data, error } = await supabase.from('profiles').insert({
        id: session.user.id,
        name: name.trim(),
        date_of_birth: dob,
        gender,
        looking_for: lookingFor,
        bio: bio.trim(),
        latitude: lat,
        longitude: lng,
      }).select().single();

      setLoading(false);
      if (error) setError(error.message);
      else onComplete(data);
    }
  };

  return (
    <div className="screen setup-screen">
      <div className="setup-step">Step {step} of 2</div>
      <div className="progress-bar"><div className="progress-fill" style={{width:`${step*50}%`}}/></div>
      {step === 1 ? (
        <>
          <div className="setup-title">Tell us about you</div>
          {error && <div className="error-msg">{error}</div>}
          <div className="input-group"><label className="input-label">First Name</label><input className="input" placeholder="Your first name" value={name} onChange={e=>setName(e.target.value)}/></div>
          <div className="input-group"><label className="input-label">Date of Birth (must be 18+)</label><input className="input" type="date" value={dob} onChange={e=>setDob(e.target.value)} max={new Date(Date.now()-18*365.25*24*60*60*1000).toISOString().split('T')[0]}/></div>
          <div className="input-group">
            <label className="input-label">I am a...</label>
            <div className="gender-grid">
              {[{v:'man',l:'Man',i:'👨'},{v:'woman',l:'Woman',i:'👩'},{v:'other',l:'Non-binary',i:'🧑'}].map(g=>(
                <div key={g.v} className={`gender-option ${gender===g.v?'selected':''}`} onClick={()=>setGender(g.v)}>
                  <div className="icon">{g.i}</div>{g.l}
                </div>
              ))}
            </div>
          </div>
          <div className="input-group">
            <label className="input-label">I want to meet...</label>
            <div className="gender-grid">
              {[{v:'men',l:'Men',i:'👨'},{v:'women',l:'Women',i:'👩'},{v:'everyone',l:'Everyone',i:'💫'}].map(g=>(
                <div key={g.v} className={`gender-option ${lookingFor===g.v?'selected':''}`} onClick={()=>setLookingFor(g.v)}>
                  <div className="icon">{g.i}</div>{g.l}
                </div>
              ))}
            </div>
          </div>
        </>
      ) : (
        <>
          <div className="setup-title">Add a bio ✍️</div>
          <p style={{color:'var(--text-dim)',fontSize:14,marginBottom:24,lineHeight:1.5}}>Optional but recommended. Tell people a bit about yourself — you'll stand out.</p>
          {error && <div className="error-msg">{error}</div>}
          <div className="input-group">
            <label className="input-label">Bio (optional)</label>
            <textarea className="input" style={{minHeight:120,resize:'none'}} placeholder="E.g. Loves hiking, terrible at cooking, always up for an adventure..." value={bio} onChange={e=>setBio(e.target.value)} maxLength={200}/>
            <div style={{textAlign:'right',fontSize:12,color:'var(--text-dim)',marginTop:4}}>{bio.length}/200</div>
          </div>
          <p style={{fontSize:12,color:'var(--text-dim)',marginBottom:16}}>We'll ask for your location to show nearby people — you can allow or skip.</p>
        </>
      )}
      <div style={{marginTop:'auto',paddingTop:20}}>
        <button className="btn btn-primary" onClick={handleNext} disabled={loading}>
          {loading ? 'Saving...' : step === 1 ? 'Next →' : 'Continue →'}
        </button>
        {step === 2 && <button className="btn btn-ghost" style={{marginTop:8}} onClick={()=>setStep(1)}>← Back</button>}
      </div>
    </div>
  );
}

// ===================== SETUP PHOTOS =====================
function SetupPhotosScreen({ session, profile, onComplete, showToast }) {
  const [photos, setPhotos] = useState(Array(6).fill(null));
  const [uploading, setUploading] = useState(false);
  const fileInputRef = useRef(null);
  const [activeSlot, setActiveSlot] = useState(null);

  const handleSlotClick = (idx) => {
    if (photos[idx]) return;
    setActiveSlot(idx);
    fileInputRef.current.click();
  };

  const handleFileChange = async (e) => {
    const file = e.target.files[0];
    if (!file || activeSlot === null) return;
    if (!file.type.startsWith('image/')) { showToast('Please select an image file'); return; }
    if (file.size > 5 * 1024 * 1024) { showToast('Photo must be under 5MB'); return; }

    setUploading(true);
    const ext = file.name.split('.').pop();
    const path = `${session.user.id}/${Date.now()}.${ext}`;
    const { error: upErr } = await supabase.storage.from('profile-photos').upload(path, file);
    if (upErr) { showToast('Upload failed, try again'); setUploading(false); return; }

    const { data: { publicUrl } } = supabase.storage.from('profile-photos').getPublicUrl(path);
    await supabase.from('photos').insert({ user_id: session.user.id, url: publicUrl, position: activeSlot + 1 });

    const newPhotos = [...photos];
    newPhotos[activeSlot] = publicUrl;
    setPhotos(newPhotos);
    setUploading(false);
    e.target.value = '';
  };

  const removePhoto = async (idx) => {
    const newPhotos = [...photos];
    newPhotos[idx] = null;
    setPhotos(newPhotos);
    await supabase.from('photos').delete().eq('user_id', session.user.id).eq('position', idx + 1);
  };

  const hasAtLeastOne = photos.some(p => p !== null);

  return (
    <div className="screen setup-screen">
      <div className="setup-step">Step 2 of 2</div>
      <div className="progress-bar"><div className="progress-fill" style={{width:'100%'}}/></div>
      <div className="setup-title">Add your photos 📸</div>
      <p style={{color:'var(--text-dim)',fontSize:14,marginBottom:24,lineHeight:1.5}}>Add up to 6 photos. Your first photo is your main profile photo. Real photos get way more matches.</p>

      <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFileChange}/>

      <div className="photo-grid">
        {photos.map((photo, idx) => (
          <div key={idx} className={`photo-slot ${idx===0?'primary-slot':''}`} onClick={()=>handleSlotClick(idx)}>
            {photo ? (
              <>
                <img src={photo} alt="Profile"/>
                <button className="remove-btn" onClick={e=>{e.stopPropagation();removePhoto(idx);}}>✕</button>
                {idx===0 && <div style={{position:'absolute',bottom:8,left:8,background:'rgba(0,0,0,.6)',borderRadius:6,padding:'3px 8px',fontSize:11,fontWeight:600}}>Main photo</div>}
              </>
            ) : (
              <div className="add-icon">{uploading && activeSlot===idx ? '⏳' : '+'}</div>
            )}
          </div>
        ))}
      </div>

      <div style={{marginTop:24}}>
        <button className="btn btn-primary" onClick={onComplete} disabled={!hasAtLeastOne || uploading}>
          {hasAtLeastOne ? "Let's go 🔥" : 'Add at least one photo'}
        </button>
        <button className="btn btn-ghost" style={{marginTop:8}} onClick={onComplete}>Skip for now</button>
      </div>
    </div>
  );
}

function MainApp({ session, profile, setProfile, onSignOut, showToast }) {
  const [tab, setTab] = useState('discover');
  const [matchScreen, setMatchScreen] = useState(null);
  const [activeChat, setActiveChat] = useState(null);
  const [matchCount, setMatchCount] = useState(0);

  useEffect(() => {
    loadMatchCount();
  }, []);

  const loadMatchCount = async () => {
    const { count } = await supabase.from('matches')
      .select('*', { count: 'exact', head: true })
      .or(`user1_id.eq.${session.user.id},user2_id.eq.${session.user.id}`)
      .eq('is_active', true);
    setMatchCount(count || 0);
  };

  if (activeChat) return <ChatScreen session={session} profile={profile} match={activeChat} onBack={()=>setActiveChat(null)} showToast={showToast}/>;
  if (matchScreen) return <MatchScreen myProfile={profile} matchedProfile={matchScreen} onChat={(m)=>{setMatchScreen(null);setActiveChat(m);setTab('matches');}} onKeepSwiping={()=>setMatchScreen(null)}/>;

  return (
    <div className="screen app-screen">
      {tab === 'discover' && <DiscoverTab session={session} profile={profile} onMatch={(matchedProfile, matchData)=>{setMatchCount(c=>c+1);setMatchScreen({...matchedProfile, matchData});}} showToast={showToast}/>}
      {tab === 'matches' && <MatchesTab session={session} profile={profile} onChat={setActiveChat} onRefresh={loadMatchCount}/>}
      {tab === 'profile' && <ProfileTab session={session} profile={profile} setProfile={setProfile} onSignOut={onSignOut} showToast={showToast}/>}
      <div className="bottom-nav">
        <div className={`nav-item ${tab==='discover'?'active':''}`} onClick={()=>setTab('discover')}>🔥<span>Discover</span></div>
        <div className={`nav-item nav-badge ${tab==='matches'?'active':''}`} onClick={()=>setTab('matches')}>
          💬{matchCount>0&&<div className="badge">{matchCount>9?'9+':matchCount}</div>}<span>Matches</span>
        </div>
        <div className={`nav-item ${tab==='profile'?'active':''}`} onClick={()=>setTab('profile')}>👤<span>Profile</span></div>
      </div>
    </div>
  );
}

// ===================== DISCOVER =====================
function DiscoverTab({ session, profile, onMatch, showToast }) {
  const [profiles, setProfiles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [swipeAnim, setSwipeAnim] = useState(null);
  const [indicator, setIndicator] = useState(null);
  const [dragOffset, setDragOffset] = useState({x:0,y:0});
  const dragState = useRef({startX:0,startY:0,isDragging:false});

  useEffect(() => { loadProfiles(); }, []);

  const loadProfiles = async () => {
    setLoading(true);
    // Get already swiped
    const { data: swiped } = await supabase.from('swipes').select('swiped_id').eq('swiper_id', session.user.id);
    const swipedIds = swiped?.map(s=>s.swiped_id) || [];
    swipedIds.push(session.user.id);

    // Get gender filter
    let genderFilter = [];
    if (profile.looking_for === 'men') genderFilter = ['man'];
    else if (profile.looking_for === 'women') genderFilter = ['woman'];
    else genderFilter = ['man','woman','other'];

    const { data } = await supabase.from('profiles')
      .select('*, photos(*)')
      .in('gender', genderFilter)
      .not('id', 'in', `(${swipedIds.join(',')})`)
      .eq('is_active', true)
      .limit(20);

    setProfiles(data || []);
    setLoading(false);
  };

  const handleSwipe = async (direction) => {
    if (!profiles[0]) return;
    const target = profiles[0];
    setSwipeAnim(direction);
    setDragOffset({x:0,y:0});

    // Record swipe
    await supabase.from('swipes').insert({ swiper_id: session.user.id, swiped_id: target.id, direction });

    if (direction === 'like') {
      // Check for mutual like
      const { data: mutualSwipe } = await supabase.from('swipes')
        .select('*').eq('swiper_id', target.id).eq('swiped_id', session.user.id).eq('direction', 'like').single();

      if (mutualSwipe) {
        // It's a match
        const { data: match } = await supabase.from('matches').select('*')
          .or(`and(user1_id.eq.${session.user.id},user2_id.eq.${target.id}),and(user1_id.eq.${target.id},user2_id.eq.${session.user.id})`)
          .single();
        setTimeout(() => {
          setProfiles(prev => prev.slice(1));
          setSwipeAnim(null); setIndicator(null);
          onMatch(target, match);
        }, 300);
        return;
      }
    }

    setTimeout(() => {
      setProfiles(prev => prev.slice(1));
      setSwipeAnim(null); setIndicator(null);
    }, 350);
  };

  const onDragStart = (e) => {
    if (swipeAnim) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    dragState.current = {startX:clientX, startY:clientY, isDragging:true};
  };

  const onDragMove = (e) => {
    if (!dragState.current.isDragging || swipeAnim) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = clientX - dragState.current.startX;
    const y = clientY - dragState.current.startY;
    setDragOffset({x, y});
    setIndicator(x > 60 ? 'like' : x < -60 ? 'nope' : null);
  };

  const onDragEnd = () => {
    if (!dragState.current.isDragging) return;
    dragState.current.isDragging = false;
    if (dragOffset.x > 100) handleSwipe('like');
    else if (dragOffset.x < -100) handleSwipe('pass');
    else { setDragOffset({x:0,y:0}); setIndicator(null); }
  };

  const current = profiles[0];
  const next = profiles[1];

  const getMainPhoto = (p) => p.photos?.sort((a,b)=>a.position-b.position)[0]?.url;
  const dist = current && distanceKm(profile.latitude, profile.longitude, current.latitude, current.longitude);

  if (loading) return <div className="empty"><div className="loading-logo">wick</div><div className="empty-sub">Finding people near you...</div></div>;

  return (
    <>
      <div className="app-header">
        <div className="header-logo">wick 🕯️</div>
        <div style={{display:'flex',gap:8}}>
          <div className="icon-btn" onClick={loadProfiles}>🔄</div>
        </div>
      </div>

      {current ? (
        <>
          <div className="card-area">
            {next && (
              <div className="profile-card behind" style={{top:0,height:460}}>
                {getMainPhoto(next)
                  ? <img className="card-photo" src={getMainPhoto(next)} alt={next.name}/>
                  : <div className="card-emoji-bg" style={{background:BG_COLORS[1]}}>😊</div>
                }
              </div>
            )}
            <div
              className={`profile-card front ${swipeAnim==='pass'?'':''}` }
              style={{
                top:0, height:460,
                transform: swipeAnim==='like' ? 'translateX(150%) rotate(20deg)' :
                           swipeAnim==='pass' ? 'translateX(-150%) rotate(-20deg)' :
                           `translateX(${dragOffset.x}px) translateY(${dragOffset.y*.15}px) rotate(${dragOffset.x*.06}deg)`,
                transition: dragState.current.isDragging ? 'none' : 'transform .35s ease',
              }}
              onMouseDown={onDragStart} onMouseMove={onDragMove} onMouseUp={onDragEnd} onMouseLeave={onDragEnd}
              onTouchStart={onDragStart} onTouchMove={onDragMove} onTouchEnd={onDragEnd}
            >
              {getMainPhoto(current)
                ? <img className="card-photo" src={getMainPhoto(current)} alt={current.name}/>
                : <div className="card-emoji-bg" style={{background:BG_COLORS[0]}}>😊</div>
              }
              <div className="card-gradient"/>
              <div className="swipe-indicator like" style={{opacity:indicator==='like'?1:0}}>LIKE 💚</div>
              <div className="swipe-indicator nope" style={{opacity:indicator==='nope'?1:0}}>NOPE ✕</div>
              <div className="card-info">
                <div className="card-name">{current.name}, {getAge(current.date_of_birth)}</div>
                {dist && <div className="card-distance">📍 {dist} away</div>}
                {current.bio && <div className="card-bio">{current.bio}</div>}
              </div>
            </div>
          </div>

          <div className="swipe-actions">
            <button className="action-btn action-pass" onClick={()=>handleSwipe('pass')}>✕</button>
            <button className="action-btn action-like" onClick={()=>handleSwipe('like')}>♥</button>
          </div>
        </>
      ) : (
        <div className="empty">
          <div className="empty-icon">🎉</div>
          <div className="empty-title">You've seen everyone!</div>
          <p className="empty-sub">Check back later for new people nearby, or see who you've already matched with.</p>
          <button className="btn btn-primary" style={{marginTop:16}} onClick={loadProfiles}>Refresh</button>
        </div>
      )}

      <div style={{height:78}}/>
    </>
  );
}

// ===================== MATCHES =====================
function MatchesTab({ session, profile, onChat, onRefresh }) {
  const [matches, setMatches] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { loadMatches(); }, []);

  const loadMatches = async () => {
    setLoading(true);
    const { data } = await supabase.from('matches')
      .select('*')
      .or(`user1_id.eq.${session.user.id},user2_id.eq.${session.user.id}`)
      .eq('is_active', true)
      .gt('expires_at', new Date().toISOString())
      .order('created_at', { ascending: false });

    if (!data) { setLoading(false); return; }

    // Load other user profiles
    const enriched = await Promise.all(data.map(async (match) => {
      const otherId = match.user1_id === session.user.id ? match.user2_id : match.user1_id;
      const { data: otherProfile } = await supabase.from('profiles').select('*, photos(*)').eq('id', otherId).single();
      const { count: msgCount } = await supabase.from('messages').select('*', {count:'exact',head:true}).eq('match_id', match.id).eq('sender_id', session.user.id);
      const { data: lastMsg } = await supabase.from('messages').select('*').eq('match_id', match.id).order('created_at', {ascending:false}).limit(1).single();
      return { ...match, otherProfile, sentMessages: msgCount || 0, lastMsg };
    }));

    setMatches(enriched);
    onRefresh();
    setLoading(false);
  };

  const getMainPhoto = (p) => p?.photos?.sort((a,b)=>a.position-b.position)[0]?.url;

  if (loading) return <div className="empty"><div className="loading-logo">wick</div></div>;

  return (
    <>
      <div className="inbox-header">
        <div className="inbox-title">Matches</div>
        <div className="inbox-sub">{matches.length} active {matches.length===1?'match':'matches'} — {MAX_MESSAGES} messages each</div>
      </div>
      <div className="scroll" style={{flex:1,paddingBottom:78}}>
        {matches.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">💘</div>
            <div className="empty-title">No matches yet</div>
            <p className="empty-sub">Keep swiping — your matches will appear here.</p>
          </div>
        ) : matches.map(match => {
          const op = match.otherProfile;
          if (!op) return null;
          const left = MAX_MESSAGES - (match.sentMessages || 0);
          const limited = left <= 0;
          const photo = getMainPhoto(op);
          const dl = daysLeft(match.expires_at);
          return (
            <div key={match.id} className="match-row" onClick={()=>onChat(match)}>
              <div className="match-avatar">
                {photo ? <img src={photo} alt={op.name} style={{width:58,height:58,borderRadius:'50%',objectFit:'cover'}}/> : '😊'}
              </div>
              <div className="match-info">
                <div className="match-name">{op.name}, {getAge(op.date_of_birth)}</div>
                <div className="match-preview">
                  {limited ? '⏰ Time to meet!' : match.lastMsg ? match.lastMsg.content : 'Say something...'}
                </div>
              </div>
              <div className="match-meta">
                <div className={`msg-pill ${limited?'warn':'ok'}`}>{limited?'Meet now':`${left} left`}</div>
                <div className="expiry-text">{dl}d left</div>
              </div>
            </div>
          );
        })}
      </div>
    </>
  );
}

// ===================== CHAT =====================
function ChatScreen({ session, profile, match, onBack, showToast }) {
  const [messages, setMessages] = useState([]);
  const [inputText, setInputText] = useState('');
  const [sending, setSending] = useState(false);
  const [dateProposed, setDateProposed] = useState(match.date_proposed_by !== null);
  const [otherProfile, setOtherProfile] = useState(null);
  const messagesEndRef = useRef(null);

  const otherId = match.user1_id === session.user.id ? match.user2_id : match.user1_id;

  useEffect(() => {
    loadData();
    // Real-time subscription
    const sub = supabase.channel(`match-${match.id}`)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `match_id=eq.${match.id}` },
        (payload) => setMessages(prev => [...prev, payload.new]))
      .subscribe();
    return () => supabase.removeChannel(sub);
  }, []);

  useEffect(() => { messagesEndRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages]);

  const loadData = async () => {
    const [{ data: msgs }, { data: op }] = await Promise.all([
      supabase.from('messages').select('*').eq('match_id', match.id).order('created_at', {ascending:true}),
      supabase.from('profiles').select('*, photos(*)').eq('id', otherId).single()
    ]);
    setMessages(msgs || []);
    setOtherProfile(op);
  };

  const sentCount = messages.filter(m => m.sender_id === session.user.id).length;
  const msgsLeft = MAX_MESSAGES - sentCount;
  const limited = msgsLeft <= 0;
  const fillPct = (sentCount / MAX_MESSAGES) * 100;

  const sendMessage = async () => {
    if (!inputText.trim() || sending || limited) return;
    setSending(true);
    const { error } = await supabase.from('messages').insert({
      match_id: match.id,
      sender_id: session.user.id,
      content: inputText.trim()
    });
    setSending(false);
    if (error) {
      if (error.message.includes('Message limit')) showToast('Message limit reached!');
      else showToast('Failed to send message');
    } else {
      setInputText('');
    }
  };

  const proposeDate = async () => {
    await supabase.from('matches').update({ date_proposed_by: session.user.id }).eq('id', match.id);
    setDateProposed(true);
    showToast('📅 Date proposed!');
  };

  const getMainPhoto = (p) => p?.photos?.sort((a,b)=>a.position-b.position)[0]?.url;
  const opPhoto = otherProfile && getMainPhoto(otherProfile);

  return (
    <div className="screen" style={{background:'var(--bg)',display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="chat-header">
        <div className="back-btn" onClick={onBack}>←</div>
        <div className="chat-avatar">
          {opPhoto ? <img src={opPhoto} alt="" style={{width:42,height:42,borderRadius:'50%',objectFit:'cover'}}/> : '😊'}
        </div>
        <div className="chat-name-block">
          <div className="chat-name">{otherProfile?.name || '...'}</div>
          <div className="chat-status">{limited ? 'Limit reached — time to meet!' : `${msgsLeft} message${msgsLeft!==1?'s':''} left`}</div>
        </div>
      </div>

      <div className="limit-bar-wrap">
        <div className="limit-bar-top">
          <span className="limit-label">Your message limit</span>
          <span className={`limit-count ${msgsLeft<=3?'warn':'safe'}`}>{sentCount}/{MAX_MESSAGES} used</span>
        </div>
        <div className="limit-track">
          <div className="limit-fill" style={{width:`${fillPct}%`,background:fillPct>=70?'linear-gradient(90deg,var(--accent),var(--accent2))':'linear-gradient(90deg,var(--green),#22d3ee)'}}/>
        </div>
      </div>

      {dateProposed && (
        <div style={{margin:'10px 16px 0',background:'rgba(74,222,128,.08)',border:'1px solid rgba(74,222,128,.25)',borderRadius:14,padding:'12px 16px',display:'flex',alignItems:'center',gap:10,fontSize:14}}>
          <span style={{fontSize:20}}>📅</span>
          <div><strong style={{color:'var(--green)'}}>Date proposed!</strong><br/><span style={{color:'var(--text-dim)',fontSize:12}}>Exchange numbers and sort the details.</span></div>
        </div>
      )}

      <div className="messages-list scroll">
        {messages.length === 0 && (
          <div style={{textAlign:'center',color:'var(--text-dim)',fontSize:14,padding:'20px 0'}}>
            You matched with {otherProfile?.name}! You have {MAX_MESSAGES} messages to arrange a date. Make them count 🔥
          </div>
        )}
        {messages.map(msg => (
          <div key={msg.id} className={`message ${msg.sender_id===session.user.id?'sent':'received'}`}>
            {msg.content}
            <div className="msg-time">{new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
          </div>
        ))}
        <div ref={messagesEndRef}/>
      </div>

      {limited && !dateProposed && (
        <div className="limit-reached-box">
          <div className="limit-reached-icon">⏰</div>
          <div className="limit-reached-title">Messages Used Up</div>
          <p className="limit-reached-sub">You've both said enough. Time to take this offline — propose a date or move on.</p>
          <div className="limit-actions">
            <button className="btn btn-primary" onClick={proposeDate}>📅 Propose a Date</button>
            <button className="btn btn-secondary btn-sm" onClick={onBack}>← Back</button>
          </div>
        </div>
      )}

      {!limited && (
        <div className="chat-input-area">
          <textarea className="chat-input" rows={1} placeholder={`Message ${otherProfile?.name||''}...`}
            value={inputText} onChange={e=>setInputText(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}}
          />
          <button className="send-btn" onClick={sendMessage} disabled={!inputText.trim()||sending}>↑</button>
        </div>
      )}
    </div>
  );
}

// ===================== MATCH SCREEN =====================
function MatchScreen({ myProfile, matchedProfile, onChat, onKeepSwiping }) {
  const getMainPhoto = (p) => p?.photos?.sort((a,b)=>a.position-b.position)[0]?.url;
  const myPhoto = getMainPhoto(myProfile);
  const theirPhoto = getMainPhoto(matchedProfile);

  return (
    <div className="screen match-screen">
      <div className="match-title">It's a Match! 🔥</div>
      <p style={{color:'var(--text-dim)',fontSize:16}}>You both liked each other</p>
      <div className="match-avatars">
        <div className="match-av">{myPhoto?<img src={myPhoto} style={{width:100,height:100,borderRadius:'50%',objectFit:'cover'}} alt=""/>:'😊'}</div>
        <div className="match-av">{theirPhoto?<img src={theirPhoto} style={{width:100,height:100,borderRadius:'50%',objectFit:'cover'}} alt=""/>:'😊'}</div>
      </div>
      <div className="match-badge">⚡ You each have <strong>{MAX_MESSAGES} messages</strong> to arrange a date. No more, no less.</div>
      <div style={{display:'flex',flexDirection:'column',gap:12,width:'100%'}}>
        <button className="btn btn-primary" onClick={onChat}>Start Chatting →</button>
        <button className="btn btn-secondary" onClick={onKeepSwiping}>Keep Swiping</button>
      </div>
    </div>
  );
}

// ===================== PROFILE TAB =====================
function ProfileTab({ session, profile, setProfile, onSignOut, showToast }) {
  const [photos, setPhotos] = useState([]);
  const fileInputRef = useRef(null);

  useEffect(() => {
    supabase.from('photos').select('*').eq('user_id', session.user.id).order('position').then(({data})=>setPhotos(data||[]));
  }, []);

  const mainPhoto = photos[0]?.url;

  return (
    <div className="scroll" style={{flex:1,paddingBottom:78}}>
      <div className="profile-header">
        <div className="profile-photo-big">
          {mainPhoto ? <img src={mainPhoto} alt="" style={{width:90,height:90,borderRadius:'50%',objectFit:'cover'}}/> : '😊'}
        </div>
        <div className="profile-name-big">{profile.name}, {getAge(profile.date_of_birth)}</div>
        <div className="profile-detail">{profile.gender} · looking for {profile.looking_for}</div>
        {profile.bio && <p style={{marginTop:10,fontSize:14,color:'var(--text-dim)',lineHeight:1.5}}>{profile.bio}</p>}
      </div>

      <div className="profile-section">
        <div className="profile-section-title">My Photos</div>
        <div className="photo-grid">
          {photos.map(p => (
            <div key={p.id} className="photo-slot" style={{aspectRatio:'3/4'}}>
              <img src={p.url} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            </div>
          ))}
        </div>
      </div>

      <div className="profile-section">
        <button className="btn btn-secondary" onClick={onSignOut}>Sign Out</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
