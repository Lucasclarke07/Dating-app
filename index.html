<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Spark — Just Meet</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700&family=Fraunces:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #161618;
      --surface2: #1e1e21;
      --accent: #ff5c6a;
      --accent2: #ff8c69;
      --text: #f5f5f7;
      --text-dim: #8e8e93;
      --border: rgba(255,255,255,0.08);
      --radius: 20px;
      --card-radius: 24px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #root {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 900px;
      position: relative;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 0;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes matchPop {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes swipeLeft {
      to { transform: translateX(-150%) rotate(-20deg); opacity: 0; }
    }

    @keyframes swipeRight {
      to { transform: translateX(150%) rotate(20deg); opacity: 0; }
    }

    /* Welcome Screen */
    .welcome {
      background: linear-gradient(160deg, #1a0a0c 0%, #0c0c0e 50%, #0a0c1a 100%);
      justify-content: space-between;
      padding: 60px 32px 48px;
    }

    .welcome-logo {
      font-family: 'Fraunces', serif;
      font-size: 36px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .welcome-tagline {
      font-family: 'Fraunces', serif;
      font-size: 52px;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -2px;
    }

    .welcome-tagline span {
      font-style: italic;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-sub {
      color: var(--text-dim);
      font-size: 16px;
      line-height: 1.5;
      margin-top: 16px;
    }

    .welcome-dots {
      display: flex;
      gap: 8px;
      margin-top: 40px;
    }

    .welcome-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
    }

    .welcome-dot.active {
      background: var(--accent);
      width: 24px;
      border-radius: 4px;
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 24px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* Setup Screen */
    .setup {
      padding: 60px 28px 40px;
      background: var(--bg);
    }

    .setup-header {
      margin-bottom: 40px;
    }

    .setup-step {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .setup-title {
      font-family: 'Fraunces', serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -1px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
      display: block;
    }

    .input-field {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: var(--accent);
    }

    .input-field::placeholder { color: var(--text-dim); }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .avatar-option {
      aspect-ratio: 1;
      border-radius: 16px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
    }

    .avatar-option.selected {
      border-color: var(--accent);
      transform: scale(1.05);
    }

    /* Swipe Screen */
    .swipe-screen {
      background: var(--bg);
    }

    .swipe-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 52px 24px 16px;
    }

    .swipe-logo {
      font-family: 'Fraunces', serif;
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .icon-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.2s;
    }

    .icon-btn:active { transform: scale(0.93); }

    .card-stack {
      position: relative;
      flex: 1;
      padding: 0 20px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .profile-card {
      position: absolute;
      width: calc(100% - 40px);
      height: 480px;
      border-radius: var(--card-radius);
      overflow: hidden;
      cursor: grab;
      user-select: none;
      touch-action: none;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .profile-card:active { cursor: grabbing; }

    .profile-card.behind {
      transform: scale(0.94) translateY(14px);
      z-index: 0;
      pointer-events: none;
    }

    .profile-card.front { z-index: 1; }

    .profile-card.swiping-left { animation: swipeLeft 0.4s ease forwards; }
    .profile-card.swiping-right { animation: swipeRight 0.4s ease forwards; }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 120px;
    }

    .card-gradient {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60%;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
    }

    .card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 24px;
    }

    .card-name {
      font-family: 'Fraunces', serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .card-detail {
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      margin-top: 4px;
    }

    .card-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .card-tag {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
    }

    .like-indicator {
      position: absolute;
      top: 40px;
      padding: 8px 18px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 24px;
      border: 3px solid;
      transform: rotate(-15deg);
      opacity: 0;
      transition: opacity 0.1s;
    }

    .like-indicator.like {
      right: 24px;
      color: #4ade80;
      border-color: #4ade80;
      transform: rotate(-15deg);
    }

    .like-indicator.nope {
      left: 24px;
      color: var(--accent);
      border-color: var(--accent);
      transform: rotate(15deg);
    }

    .swipe-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px 24px 32px;
    }

    .action-btn {
      border: none;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 24px;
    }

    .action-btn:active { transform: scale(0.9); }

    .action-pass {
      width: 60px; height: 60px;
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid var(--border);
    }

    .action-like {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 8px 30px rgba(255, 92, 106, 0.4);
    }

    .action-super {
      width: 60px; height: 60px;
      background: var(--surface2);
      color: #60a5fa;
      border: 1px solid var(--border);
    }

    /* Match Screen */
    .match-screen {
      background: radial-gradient(ellipse at 50% 40%, rgba(255,92,106,0.25) 0%, var(--bg) 65%);
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 40px 32px;
      text-align: center;
    }

    .match-title {
      font-family: 'Fraunces', serif;
      font-size: 56px;
      font-weight: 900;
      font-style: italic;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: matchPop 0.5s ease;
      letter-spacing: -2px;
      margin-bottom: 8px;
    }

    .match-sub {
      color: var(--text-dim);
      font-size: 16px;
      margin-bottom: 40px;
    }

    .match-avatars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: -20px;
      margin-bottom: 40px;
    }

    .match-avatar {
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 4px solid var(--bg);
      font-size: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      animation: matchPop 0.5s ease;
    }

    .match-avatar:last-child {
      margin-left: -20px;
      animation-delay: 0.1s;
    }

    .match-limit-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    .match-limit-badge strong {
      color: var(--accent);
    }

    /* Inbox */
    .inbox-screen {
      background: var(--bg);
    }

    .inbox-header {
      padding: 52px 24px 20px;
    }

    .inbox-title {
      font-family: 'Fraunces', serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .match-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .match-row:active { background: var(--surface); }

    .match-row-avatar {
      width: 58px; height: 58px;
      border-radius: 50%;
      font-size: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      flex-shrink: 0;
      position: relative;
    }

    .msg-badge {
      position: absolute;
      top: -2px; right: -2px;
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--bg);
    }

    .match-row-info { flex: 1; min-width: 0; }

    .match-row-name {
      font-weight: 600;
      font-size: 16px;
    }

    .match-row-preview {
      color: var(--text-dim);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .match-row-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .msg-counter {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .msg-counter.warning { color: var(--accent); border-color: rgba(255,92,106,0.3); }
    .msg-counter.ok { color: #4ade80; }

    /* Chat Screen */
    .chat-screen {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 52px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      font-size: 22px;
      cursor: pointer;
      color: var(--text-dim);
      padding: 4px;
    }

    .chat-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--surface2);
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-name {
      font-weight: 600;
      font-size: 17px;
    }

    .chat-limit-bar {
      margin: 0 16px 0;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: 14px;
      margin-top: 12px;
    }

    .limit-bar-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .limit-label { color: var(--text-dim); }

    .limit-count {
      font-weight: 700;
      font-size: 13px;
    }

    .limit-count.danger { color: var(--accent); }
    .limit-count.safe { color: #4ade80; }

    .limit-progress {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .limit-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .messages-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .messages-list::-webkit-scrollbar { display: none; }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.4;
      animation: fadeIn 0.2s ease;
    }

    .message.sent {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border-bottom-right-radius: 6px;
    }

    .message.received {
      align-self: flex-start;
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 6px;
    }

    .chat-input-area {
      padding: 12px 16px 28px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      border-top: 1px solid var(--border);
    }

    .chat-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 13px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      resize: none;
      max-height: 100px;
      transition: border-color 0.2s;
    }

    .chat-input:focus { border-color: var(--accent); }
    .chat-input::placeholder { color: var(--text-dim); }
    .chat-input:disabled { opacity: 0.5; cursor: not-allowed; }

    .send-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Limit Reached */
    .limit-reached {
      margin: 12px 16px;
      background: linear-gradient(135deg, rgba(255,92,106,0.15), rgba(255,140,105,0.1));
      border: 1px solid rgba(255,92,106,0.3);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      animation: slideUp 0.4s ease;
    }

    .limit-reached-icon { font-size: 40px; margin-bottom: 12px; }

    .limit-reached-title {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .limit-reached-sub {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .limit-actions {
      display: flex;
      gap: 10px;
    }

    .limit-actions .btn {
      font-size: 14px;
      padding: 12px 16px;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 72px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding-bottom: 8px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 8px 20px;
      border-radius: 12px;
      transition: all 0.15s;
      font-size: 22px;
    }

    .nav-item span {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
    }

    .nav-item.active span { color: var(--accent); }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      gap: 16px;
    }

    .empty-icon { font-size: 64px; }

    .empty-title {
      font-family: 'Fraunces', serif;
      font-size: 26px;
      font-weight: 700;
    }

    .empty-sub { color: var(--text-dim); font-size: 15px; line-height: 1.5; }

    /* Date proposed banner */
    .date-proposed {
      background: linear-gradient(135deg, rgba(74,222,128,0.15), rgba(74,222,128,0.05));
      border: 1px solid rgba(74,222,128,0.3);
      border-radius: 16px;
      padding: 14px 18px;
      margin: 0 16px 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideUp 0.3s ease;
    }

    .date-proposed-icon { font-size: 24px; }
    .date-proposed-text { font-size: 14px; line-height: 1.4; }
    .date-proposed-text strong { color: #4ade80; }

    .section-divider {
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 8px 0;
      position: relative;
    }

    .section-divider::before, .section-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }

    .section-divider::before { left: 0; }
    .section-divider::after { right: 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef } = React;

const MAX_MESSAGES = 5;

const DEMO_PROFILES = [
  { id: 1, name: "Olivia", age: 23, emoji: "👩‍🦰", bio: "Art historian by day, terrible chef by night.", tags: ["Art", "Wine", "Hiking"] },
  { id: 2, name: "Zara", age: 24, emoji: "👩‍🦱", bio: "Film student. Will drag you to a foreign film.", tags: ["Cinema", "Coffee", "Travel"] },
  { id: 3, name: "Ava", age: 22, emoji: "👩‍🦳", bio: "Architecture student. Has strong opinions about fonts.", tags: ["Design", "Yoga", "Books"] },
  { id: 4, name: "Mia", age: 25, emoji: "🧑‍🎤", bio: "Musician. Will inevitably write a song about you.", tags: ["Music", "Gigs", "Dogs"] },
  { id: 5, name: "Isla", age: 23, emoji: "👩", bio: "Marine biologist. 70% of conversations are about the ocean.", tags: ["Ocean", "Science", "Surfing"] },
  { id: 6, name: "Freya", age: 26, emoji: "🧕", bio: "Startup founder. Probably has a whiteboard in every room.", tags: ["Tech", "Tennis", "Reading"] },
];

const COLORS = ["#ff6b8a", "#ffa07a", "#87ceeb", "#98fb98", "#dda0dd", "#f0e68c"];

function App() {
  const [screen, setScreen] = useState("welcome");
  const [profile, setProfile] = useState({ name: "", age: "", emoji: "😊" });
  const [profiles, setProfiles] = useState(DEMO_PROFILES);
  const [matches, setMatches] = useState([]);
  const [activeMatch, setActiveMatch] = useState(null);
  const [swipeAnim, setSwipeAnim] = useState(null);
  const [showLikeIndicator, setShowLikeIndicator] = useState(null);
  const [nav, setNav] = useState("swipe");
  const [messages, setMessages] = useState({});
  const [inputText, setInputText] = useState("");
  const [dateProposed, setDateProposed] = useState({});
  const messagesEndRef = useRef(null);

  const currentProfile = profiles[0];
  const dragState = useRef({ startX: 0, startY: 0, isDragging: false });
  const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });

  const handleSwipe = (direction) => {
    if (!currentProfile) return;
    setSwipeAnim(direction);
    setShowLikeIndicator(direction === "right" ? "like" : "nope");
    setDragOffset({ x: 0, y: 0 });

    setTimeout(() => {
      if (direction === "right") {
        const newMatch = {
          ...currentProfile,
          matchedAt: new Date(),
          color: COLORS[matches.length % COLORS.length]
        };
        setMatches(prev => [...prev, newMatch]);
        setActiveMatch(newMatch);
        setMessages(prev => ({ ...prev, [currentProfile.id]: [] }));
        setScreen("match");
      }
      setProfiles(prev => prev.slice(1));
      setSwipeAnim(null);
      setShowLikeIndicator(null);
    }, 400);
  };

  const onDragStart = (e) => {
    if (swipeAnim) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    dragState.current = { startX: clientX, startY: clientY, isDragging: true };
  };

  const onDragMove = (e) => {
    if (!dragState.current.isDragging || swipeAnim) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = clientX - dragState.current.startX;
    const y = clientY - dragState.current.startY;
    setDragOffset({ x, y });
    const threshold = 60;
    setShowLikeIndicator(x > threshold ? "like" : x < -threshold ? "nope" : null);
  };

  const onDragEnd = () => {
    if (!dragState.current.isDragging) return;
    dragState.current.isDragging = false;
    const threshold = 100;
    if (dragOffset.x > threshold) handleSwipe("right");
    else if (dragOffset.x < -threshold) handleSwipe("left");
    else {
      setDragOffset({ x: 0, y: 0 });
      setShowLikeIndicator(null);
    }
  };

  const sendMessage = (matchId) => {
    if (!inputText.trim()) return;
    const matchMsgs = messages[matchId] || [];
    if (matchMsgs.length >= MAX_MESSAGES) return;

    const newMsg = { id: Date.now(), text: inputText.trim(), sent: true, time: new Date() };
    const updated = [...matchMsgs, newMsg];
    setMessages(prev => ({ ...prev, [matchId]: updated }));
    setInputText("");

    // Auto-reply if under limit
    if (updated.length < MAX_MESSAGES) {
      setTimeout(() => {
        const replies = [
          "Haha that's actually really funny 😂",
          "Okay I have to ask — what are you doing this week?",
          "You seem like trouble. I'm interested.",
          "I feel like we're either going to get on really well or be complete disasters together.",
          "Okay honestly? Let's just meet and find out.",
        ];
        const replyMsg = {
          id: Date.now() + 1,
          text: replies[Math.min(updated.length - 1, replies.length - 1)],
          sent: false,
          time: new Date()
        };
        setMessages(prev => ({
          ...prev,
          [matchId]: [...(prev[matchId] || []), replyMsg]
        }));
      }, 800);
    }
  };

  const proposeDate = (matchId) => {
    setDateProposed(prev => ({ ...prev, [matchId]: true }));
  };

  const getMsgsLeft = (matchId) => {
    const used = (messages[matchId] || []).filter(m => m.sent).length;
    return MAX_MESSAGES - used;
  };

  const isLimitReached = (matchId) => getMsgsLeft(matchId) <= 0;

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, activeMatch]);

  // WELCOME
  if (screen === "welcome") {
    return (
      <div className="screen welcome">
        <div className="welcome-logo">spark ✦</div>
        <div>
          <div className="welcome-tagline">Stop texting.<br/><span>Just meet.</span></div>
          <p className="welcome-sub">You get {MAX_MESSAGES} messages. Make them count. Then take it offline.</p>
          <div className="welcome-dots">
            <div className="welcome-dot active"></div>
            <div className="welcome-dot"></div>
            <div className="welcome-dot"></div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <button className="btn btn-primary" onClick={() => setScreen("setup")}>Get Started →</button>
          <button className="btn btn-ghost">Already have an account? Sign in</button>
        </div>
      </div>
    );
  }

  // SETUP
  if (screen === "setup") {
    const emojis = ["😊","🙂","😄","🤩","😎","🥰","🧑‍💻","🧑‍🎨","🧑‍🍳","🧑‍🚀","🎸","🏋️"];
    return (
      <div className="screen setup">
        <div className="setup-header">
          <div className="setup-step">Step 1 of 1</div>
          <div className="setup-title">Who are<br/>you?</div>
        </div>
        <div style={{flex:1}}>
          <div className="input-group">
            <label className="input-label">First Name</label>
            <input className="input-field" placeholder="Your first name" value={profile.name}
              onChange={e => setProfile(p => ({...p, name: e.target.value}))} />
          </div>
          <div className="input-group">
            <label className="input-label">Age</label>
            <input className="input-field" placeholder="Your age" type="number" value={profile.age}
              onChange={e => setProfile(p => ({...p, age: e.target.value}))} />
          </div>
          <div className="input-group">
            <label className="input-label">Pick your avatar</label>
            <div className="avatar-grid">
              {emojis.map(e => (
                <div key={e} className={`avatar-option ${profile.emoji === e ? "selected" : ""}`}
                  onClick={() => setProfile(p => ({...p, emoji: e}))}>
                  {e}
                </div>
              ))}
            </div>
          </div>
        </div>
        <button className="btn btn-primary" style={{marginTop:24}}
          onClick={() => { if(profile.name && profile.age) { setScreen("swipe"); setNav("swipe"); }}}>
          Find Matches →
        </button>
      </div>
    );
  }

  // MATCH SCREEN
  if (screen === "match" && activeMatch) {
    return (
      <div className="screen match-screen">
        <div className="match-title">It's a Match!</div>
        <p className="match-sub">You both liked each other</p>
        <div className="match-avatars">
          <div className="match-avatar">{profile.emoji}</div>
          <div className="match-avatar">{activeMatch.emoji}</div>
        </div>
        <div className="match-limit-badge">
          ⚡ You have <strong>{MAX_MESSAGES} messages</strong> to arrange a date. No more, no less.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%"}}>
          <button className="btn btn-primary" onClick={() => {
            setScreen("chat");
            setNav("inbox");
          }}>Start Chatting →</button>
          <button className="btn btn-secondary" onClick={() => {
            setScreen("swipe");
            setNav("swipe");
            setActiveMatch(null);
          }}>Keep Swiping</button>
        </div>
      </div>
    );
  }

  // MAIN APP SCREENS
  const renderSwipe = () => (
    <>
      <div className="swipe-header">
        <div className="swipe-logo">spark ✦</div>
        <div style={{display:"flex",gap:8}}>
          <div className="icon-btn" onClick={() => { setScreen("chat"); setNav("inbox"); }}>💬</div>
          <div className="icon-btn">⚙️</div>
        </div>
      </div>

      {currentProfile ? (
        <>
          <div className="card-stack">
            {profiles[1] && (
              <div className="profile-card behind">
                <div className="card-image" style={{background: `linear-gradient(135deg, ${COLORS[1]}, ${COLORS[2]})`, fontSize:120}}>
                  {profiles[1].emoji}
                </div>
                <div className="card-gradient" />
                <div className="card-info">
                  <div className="card-name">{profiles[1].name}, {profiles[1].age}</div>
                </div>
              </div>
            )}
            <div
              className={`profile-card front ${swipeAnim === "left" ? "swiping-left" : ""} ${swipeAnim === "right" ? "swiping-right" : ""}`}
              style={!swipeAnim ? {
                transform: `translateX(${dragOffset.x}px) translateY(${dragOffset.y * 0.2}px) rotate(${dragOffset.x * 0.07}deg)`,
                transition: dragState.current.isDragging ? "none" : "transform 0.3s ease"
              } : {}}
              onMouseDown={onDragStart}
              onMouseMove={onDragMove}
              onMouseUp={onDragEnd}
              onMouseLeave={onDragEnd}
              onTouchStart={onDragStart}
              onTouchMove={onDragMove}
              onTouchEnd={onDragEnd}
            >
              <div className="card-image" style={{background: `linear-gradient(135deg, ${COLORS[0]}, ${COLORS[1]})`, fontSize:120}}>
                {currentProfile.emoji}
              </div>
              <div className="card-gradient" />
              <div className="like-indicator like" style={{opacity: showLikeIndicator === "like" ? 1 : 0}}>LIKE</div>
              <div className="like-indicator nope" style={{opacity: showLikeIndicator === "nope" ? 1 : 0}}>NOPE</div>
              <div className="card-info">
                <div className="card-name">{currentProfile.name}, {currentProfile.age}</div>
                <div className="card-detail">{currentProfile.bio}</div>
                <div className="card-tags">
                  {currentProfile.tags.map(t => <span key={t} className="card-tag">{t}</span>)}
                </div>
              </div>
            </div>
          </div>

          <div className="swipe-actions">
            <button className="action-btn action-pass" onClick={() => handleSwipe("left")}>✕</button>
            <button className="action-btn action-like" onClick={() => handleSwipe("right")}>♥</button>
            <button className="action-btn action-super" onClick={() => handleSwipe("right")}>★</button>
          </div>
        </>
      ) : (
        <div className="empty-state">
          <div className="empty-icon">🎉</div>
          <div className="empty-title">You've seen everyone</div>
          <p className="empty-sub">Check back later for new people, or start chatting with your matches.</p>
          <button className="btn btn-primary" style={{marginTop:8}} onClick={() => { setNav("inbox"); }}>
            View Matches
          </button>
        </div>
      )}

      <div className="bottom-nav">
        <div className={`nav-item ${nav === "swipe" ? "active" : ""}`} onClick={() => setNav("swipe")}>
          🔥<span>Discover</span>
        </div>
        <div className={`nav-item ${nav === "inbox" ? "active" : ""}`} onClick={() => setNav("inbox")}>
          💬<span>Matches</span>
        </div>
        <div className={`nav-item ${nav === "profile" ? "active" : ""}`} onClick={() => setNav("profile")}>
          {profile.emoji}<span>Profile</span>
        </div>
      </div>
    </>
  );

  const renderInbox = () => (
    <>
      <div className="inbox-screen" style={{flex:1, overflowY:"auto"}}>
        <div className="inbox-header">
          <div className="inbox-title">Matches</div>
          <p style={{color:"var(--text-dim)", fontSize:14, marginTop:4}}>
            {matches.length} {matches.length === 1 ? "match" : "matches"} — messages are limited. Use them wisely.
          </p>
        </div>

        {matches.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">💘</div>
            <div className="empty-title">No matches yet</div>
            <p className="empty-sub">Go swipe on some profiles and your matches will appear here.</p>
            <button className="btn btn-primary" style={{marginTop:8}} onClick={() => setNav("swipe")}>Start Swiping</button>
          </div>
        ) : (
          matches.map(match => {
            const matchMsgs = messages[match.id] || [];
            const lastMsg = matchMsgs[matchMsgs.length - 1];
            const left = getMsgsLeft(match.id);
            const limited = isLimitReached(match.id);
            return (
              <div className="match-row" key={match.id} onClick={() => {
                setActiveMatch(match);
                setScreen("chat");
              }}>
                <div className="match-row-avatar">
                  {match.emoji}
                  {!limited && <div className="msg-badge">{left}</div>}
                </div>
                <div className="match-row-info">
                  <div className="match-row-name">{match.name}</div>
                  <div className="match-row-preview">
                    {dateProposed[match.id] ? "📅 Date proposed!" :
                     limited ? "⏰ Time to meet or move on" :
                     lastMsg ? lastMsg.text : "Say something..."}
                  </div>
                </div>
                <div className="match-row-meta">
                  <div className={`msg-counter ${limited ? "warning" : "ok"}`}>
                    {limited ? "Meet now" : `${left} left`}
                  </div>
                </div>
              </div>
            );
          })
        )}
      </div>

      <div className="bottom-nav">
        <div className={`nav-item ${nav === "swipe" ? "active" : ""}`} onClick={() => setNav("swipe")}>
          🔥<span>Discover</span>
        </div>
        <div className={`nav-item ${nav === "inbox" ? "active" : ""}`} onClick={() => setNav("inbox")}>
          💬<span>Matches</span>
        </div>
        <div className={`nav-item ${nav === "profile" ? "active" : ""}`} onClick={() => setNav("profile")}>
          {profile.emoji}<span>Profile</span>
        </div>
      </div>
    </>
  );

  const renderChat = () => {
    if (!activeMatch) return null;
    const matchMsgs = messages[activeMatch.id] || [];
    const limited = isLimitReached(activeMatch.id);
    const sentCount = matchMsgs.filter(m => m.sent).length;
    const msgsLeft = MAX_MESSAGES - sentCount;
    const fillPct = (sentCount / MAX_MESSAGES) * 100;

    return (
      <div className="chat-screen" style={{height:"100%", display:"flex", flexDirection:"column"}}>
        <div className="chat-header">
          <div className="back-btn" onClick={() => { setScreen(null); setNav("inbox"); setActiveMatch(null); }}>←</div>
          <div className="chat-avatar">{activeMatch.emoji}</div>
          <div>
            <div className="chat-name">{activeMatch.name}</div>
            <div style={{fontSize:12, color:"var(--text-dim)"}}>
              {limited ? "No messages left" : `${msgsLeft} message${msgsLeft !== 1 ? "s" : ""} left`}
            </div>
          </div>
        </div>

        <div className="chat-limit-bar">
          <div className="limit-bar-top">
            <span className="limit-label">Message limit</span>
            <span className={`limit-count ${msgsLeft <= 1 ? "danger" : "safe"}`}>
              {sentCount}/{MAX_MESSAGES} used
            </span>
          </div>
          <div className="limit-progress">
            <div className="limit-fill" style={{
              width: `${fillPct}%`,
              background: fillPct >= 80 ? "linear-gradient(90deg, #ff5c6a, #ff8c69)" : "linear-gradient(90deg, #4ade80, #22d3ee)"
            }} />
          </div>
        </div>

        {dateProposed[activeMatch.id] && (
          <div className="date-proposed">
            <div className="date-proposed-icon">📅</div>
            <div className="date-proposed-text">
              <strong>Date proposed!</strong> Waiting for {activeMatch.name} to confirm.
            </div>
          </div>
        )}

        <div className="messages-list">
          {matchMsgs.length === 0 && (
            <div style={{textAlign:"center", color:"var(--text-dim)", fontSize:14, padding:"20px 0"}}>
              You matched with {activeMatch.name}! You have {MAX_MESSAGES} messages to arrange a date.
            </div>
          )}
          {matchMsgs.map(msg => (
            <div key={msg.id} className={`message ${msg.sent ? "sent" : "received"}`}>
              {msg.text}
            </div>
          ))}
          <div ref={messagesEndRef} />
        </div>

        {limited && !dateProposed[activeMatch.id] && (
          <div className="limit-reached">
            <div className="limit-reached-icon">⏰</div>
            <div className="limit-reached-title">Messages Used Up</div>
            <p className="limit-reached-sub">
              You've both said enough. Time to take this offline — propose a date or move on.
            </p>
            <div className="limit-actions">
              <button className="btn btn-primary" onClick={() => proposeDate(activeMatch.id)}>
                📅 Propose a Date
              </button>
              <button className="btn btn-secondary" style={{flex:"0 0 auto", width:"auto", padding:"12px 16px"}}>
                ✕ Unmatch
              </button>
            </div>
          </div>
        )}

        {!limited && (
          <div className="chat-input-area">
            <textarea
              className="chat-input"
              placeholder={`Message ${activeMatch.name}...`}
              value={inputText}
              rows={1}
              onChange={e => setInputText(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(activeMatch.id); }}}
            />
            <button className="send-btn" onClick={() => sendMessage(activeMatch.id)} disabled={!inputText.trim()}>
              ↑
            </button>
          </div>
        )}

        {limited && dateProposed[activeMatch.id] && (
          <div style={{padding:"12px 16px 28px", textAlign:"center", color:"var(--text-dim)", fontSize:14}}>
            📅 Date proposed — check your messages!
          </div>
        )}
      </div>
    );
  };

  // Router for main app
  if (screen === "chat" && activeMatch) return <div className="screen">{renderChat()}</div>;

  return (
    <div className="screen" style={{position:"relative"}}>
      {nav === "swipe" && renderSwipe()}
      {nav === "inbox" && renderInbox()}
      {nav === "profile" && (
        <div style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32, gap:16}}>
          <div style={{fontSize:80}}>{profile.emoji}</div>
          <div style={{fontFamily:"Fraunces", fontSize:28, fontWeight:700}}>{profile.name || "You"}, {profile.age}</div>
          <div style={{color:"var(--text-dim)", fontSize:14}}>MVP Profile — more features coming soon</div>
          <button className="btn btn-secondary" style={{marginTop:16}} onClick={() => setScreen("welcome")}>Sign Out</button>
          <div className="bottom-nav" style={{position:"absolute", bottom:0, left:0, right:0}}>
            <div className="nav-item" onClick={() => setNav("swipe")}>🔥<span>Discover</span></div>
            <div className="nav-item" onClick={() => setNav("inbox")}>💬<span>Matches</span></div>
            <div className="nav-item active">{profile.emoji}<span>Profile</span></div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
